<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>MemoryGame</title>
</head>

<body>
    <div id="menu">
        <h1>MemoryGame</h1>

        <div id="cards-container">
            <button class="btn-option hp" data-theme="hp">Harry Potter</button>
            <button class="btn-option dogs" data-theme="dogs">Dogs</button>
            <button class="btn-option cats" data-theme="cats">Cats</button>
        </div>
    </div>


    <div id="status">
        <span id="time">0</span> |
        <span id="score">0</span>
    </div>

    <div id="gameBoard" style="display: none;">
        <div class="board"></div>

    </div>




    <script src="script.js"></script>
</body>
